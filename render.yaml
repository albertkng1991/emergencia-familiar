databases:
  - name: emergencia-db
    plan: free
    databaseName: emergencia
    postgresMajorVersion: "16"

services:
  - type: web
    name: emergencia-familiar
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node web/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: emergencia-db
          property: connectionString
