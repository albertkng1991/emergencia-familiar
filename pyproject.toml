[tool.ruff]
target-version = "py312"
line-length = 120
extend-exclude = ["backend/research/researcher.py"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]

[tool.ruff.lint.isort]
known-first-party = ["backend"]

[tool.ruff.format]
